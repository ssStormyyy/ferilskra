<!DOCTYPE html>
<html>
    <head>
        <title>Ferilskrá</title>
        <link rel="stylesheet" href="css/styles.css">
        <script src="js/script.js" defer></script>
    </head>
    <body>
        <h1>Ferilskrá</h1>
        <h3>Stormy</h3>
        <h4>1</h4>
        <div class="gradient-bg"></div>

        <svg style="display: none;">
            <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            </filter>
        </svg>
        <p class="title1">Fyrsti Tími</p>
        <p class="text1">í fyrsta tímanum lærðum við hvað inkscape er<br>og í hvað við getum notað það.<br>við lærðum að inkscape er vector forrit<br>sem þýðir að það er hægt<br>að stækka og minnka formin einsog<br>manni langar og gæðin breytast ekkert.</p>
        <img class="inkscape" src="css/inkscape.png">
    </body>

</html>
